name: Build VMOD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Run JavaScript actions on Node 24 even when they declare Node 20.
  # Becomes the default on 2026-06-02; opting in early to silence
  # deprecation warnings and surface any incompatibilities now.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: build (varnish ${{ matrix.varnish }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: varnish:${{ matrix.varnish }}
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        varnish: ['9.0.0', '9.0.1']
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Install build tools and varnish-dev
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            curl build-essential pkg-config clang libclang-dev git libssl-dev \
            varnish-dev=${{ matrix.varnish }}-1~trixie

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.92.0 --component clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-varnish${{ matrix.varnish }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: cargo clippy --features vmod --release -- -D warnings

      - name: Build VMOD
        run: cargo build --features vmod --release

      - name: Run unit tests
        run: cargo test --features vmod --release --lib

      - name: Run VTC integration tests
        run: |
          for vtc in tests/*.vtc; do
            echo "=== Running $vtc ==="
            varnishtest -D vmod="$(pwd)/target/release/libvmod_oidc.so" "$vtc"
          done

      - name: Rename artifact
        run: |
          cp target/release/libvmod_oidc.so \
             "libvmod_oidc-varnish${{ matrix.varnish }}-${{ matrix.arch }}.so"

      - name: Upload VMOD artifact
        uses: actions/upload-artifact@v4
        with:
          name: libvmod_oidc-varnish${{ matrix.varnish }}-${{ matrix.arch }}
          path: libvmod_oidc-varnish${{ matrix.varnish }}-${{ matrix.arch }}.so

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: libvmod_oidc-varnish${{ matrix.varnish }}-${{ matrix.arch }}.so
          generate_release_notes: true

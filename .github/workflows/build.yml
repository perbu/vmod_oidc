name: Build VMOD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (varnish ${{ matrix.varnish }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: debian:trixie
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        varnish: ['9.0.0', '9.0.1']
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Install build tools
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            ca-certificates curl git build-essential pkg-config \
            clang libclang-dev libssl-dev \
            autoconf automake libtool \
            python3-sphinx python3-docutils \
            libpcre2-dev libedit-dev libjemalloc-dev

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Varnish build
        id: varnish-cache
        uses: actions/cache@v4
        with:
          path: /github/home/varnish-install
          key: varnish-${{ matrix.varnish }}-${{ matrix.arch }}-trixie-v1

      - name: Build Varnish from source
        if: steps.varnish-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch varnish-${{ matrix.varnish }} \
            https://github.com/varnishcache/varnish-cache.git /tmp/varnish-src
          cd /tmp/varnish-src
          ./autogen.sh
          ./configure --prefix=/github/home/varnish-install --disable-dependency-tracking
          make -j"$(nproc)"
          make install

      - name: Configure Varnish env
        run: |
          echo "/github/home/varnish-install/bin" >> $GITHUB_PATH
          echo "/github/home/varnish-install/sbin" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=/github/home/varnish-install/lib/pkgconfig" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/github/home/varnish-install/lib" >> $GITHUB_ENV

      - name: Verify Varnish install
        run: |
          /github/home/varnish-install/sbin/varnishd -V
          PKG_CONFIG_PATH=/github/home/varnish-install/lib/pkgconfig \
            pkg-config --modversion varnishapi

      - name: Set up Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.92.0 --component clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-varnish${{ matrix.varnish }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: cargo clippy --features vmod --release -- -D warnings

      - name: Build VMOD
        run: cargo build --features vmod --release

      - name: Run unit tests
        run: cargo test --features vmod --release --lib

      - name: Run VTC integration tests
        run: |
          for vtc in tests/*.vtc; do
            echo "=== Running $vtc ==="
            varnishtest -D vmod="$(pwd)/target/release/libvmod_oidc.so" "$vtc"
          done

      - name: Rename artifact
        run: |
          cp target/release/libvmod_oidc.so \
             "libvmod_oidc-varnish${{ matrix.varnish }}-${{ matrix.arch }}.so"

      - name: Upload VMOD artifact
        uses: actions/upload-artifact@v4
        with:
          name: libvmod_oidc-varnish${{ matrix.varnish }}-${{ matrix.arch }}
          path: libvmod_oidc-varnish${{ matrix.varnish }}-${{ matrix.arch }}.so

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: libvmod_oidc-varnish${{ matrix.varnish }}-${{ matrix.arch }}.so
          generate_release_notes: true
